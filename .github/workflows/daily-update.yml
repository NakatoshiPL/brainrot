name: Daily data update

on:
  schedule:
    # Every day at 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies (scripts)
        run: npm ci

      - name: Scrape & update income values
        run: npm run update-values

      - name: Sync brainrots.json to backend + frontend
        run: npm run sync-data

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brainrots.json backend/data/brainrots.json frontend/public/brainrots.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "chore: auto daily update $(date -u +%Y-%m-%d)"
            git push
          fi
