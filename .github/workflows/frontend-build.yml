# Buduje frontend przy każdym pushu/PR — bez sekretów. Weryfikacja przed deployem na Vercel.
name: Frontend build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (production)
        env:
          # Dummy na czas CI — prawdziwy URL tylko na Vercelu
          VITE_API_URL: https://example.com
        run: npm run build
