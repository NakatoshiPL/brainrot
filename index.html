    let offered = [], requested = [];

    function toId(name) {
      return String(name).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/['']/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    }

    function formatIncome(n) {
      if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
      if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
      if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
      return String(n);
    }

    function thumbStyle(rarity) {
      return 'background:' + (RARITY_COLORS[rarity] || '#444') + ';';
    }

    function makeItemEl(b, opts) {
      const div = document.createElement('div');
      div.className = 'item';
      const initials = b.name.replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase() || '?';
      const imgUrl = (b.imageUrl && b.imageUrl.startsWith('http')) ? b.imageUrl : (ORIGINAL_IMAGE_BASE + (b.id || toId(b.name)) + '.webp');
      const fallbackId = 'fb_' + Math.random().toString(36).slice(2);
      div.innerHTML = '<div class="item-thumb-wrap"><img class="item-thumb img" alt="' + b.name.replace(/"/g,'&quot;') + '" loading="lazy" src="' + imgUrl + '" onerror="this.style.display=\'none\';document.getElementById(\'' + fallbackId + '\').style.display=\'flex\'"><div id="' + fallbackId + '" class="item-thumb" style="' + thumbStyle(b.rarity) + ';display:none">' + initials + '</div></div><div><b>' + b.name + '</b></div><div class="rarity ' + b.rarity + '">' + b.rarity + '</div><div>' + b.baseIncome.toLocaleString() + ' $/s</div>';
      const img = div.querySelector('img');
      const fallback = div.querySelector('#' + fallbackId);
      if (img && fallback) img.onerror = function() { this.style.display='none'; fallback.style.display='flex'; };
      return div;
    }

    function renderItems(containerId, list, isSide) {
      const cont = document.getElementById(containerId);
      cont.innerHTML = '';
      list.forEach((b, i) => {
        const div = makeItemEl(b);
        if (isSide) {
          div.onclick = (e) => { e.stopPropagation(); list.splice(i, 1); updateSides(); };
        } else {
          div.onclick = (e) => {
            if (e.altKey) { requested.push(b); } else { offered.push(b); }
            updateSides();
          };
        }
        cont.appendChild(div);
      });
      if (containerId === 'offered') document.getElementById('offeredTotal').textContent = formatIncome(offered.reduce((s,b)=>s+b.baseIncome,0)) + ' $/s';
      if (containerId === 'requested') document.getElementById('requestedTotal').textContent = formatIncome(requested.reduce((s,b)=>s+b.baseIncome,0)) + ' $/s';
    }

    function updateSides() {
      renderItems('offered', offered, true);
      renderItems('requested', requested, true);
    }

    function calculateTrade() {
      const offeredVal = offered.reduce((s,b)=>s+b.baseIncome,0);
      const requestedVal = requested.reduce((s,b)=>s+b.baseIncome,0);
      const diff = offeredVal ? ((requestedVal - offeredVal) / offeredVal) * 100 : (requestedVal ? 100 : 0);

      let status = '', color = '';
      if (diff > 15) { status = 'WIN 🔥 MEGA ZYSK!'; color = 'win'; }
      else if (diff >= -10) { status = 'FAIR ⚖️'; color = 'fair'; }
      else { status = 'LOSS ❌ strata'; color = 'loss'; }

      document.getElementById('result').innerHTML = '<div class="' + color + '">' + status + '</div><p>Twoja oferta: ' + formatIncome(offeredVal) + ' $/s<br>Dostajesz: ' + formatIncome(requestedVal) + ' $/s<br>Różnica: ' + diff.toFixed(1) + '%</p>';
    }

    function renderAll(list) {
      const cont = document.getElementById('allItems');
      cont.innerHTML = '';
      list.forEach(b => {
        const div = makeItemEl(b);
        div.onclick = (e) => {
          if (e.altKey) requested.push(b); else offered.push(b);
          updateSides();
        };
        cont.appendChild(div);
      });
    }

    renderAll(brainrots);
    document.getElementById('search').addEventListener('input', function() {
      const term = this.value.toLowerCase();
      renderAll(term ? brainrots.filter(b => b.name.toLowerCase().includes(term)) : brainrots);
    });
